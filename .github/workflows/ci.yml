name: CI

on:
    push:
        branches: [main]
    pull_request: ~

jobs:
    cs-check:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4
            - name: setup
              uses: castor-php/setup-castor@v0.1.0
            - name: php-cs-fixer check
              env:
                  PHP_CS_FIXER_IGNORE_ENV: 1
              run: castor qa:cs:check

    spec-check:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4
            - name: setup-php
              uses: shivammathur/setup-php@2.32.0
              with:
                  php-version: '8.5'
                  coverage: none
            - name: setup-castor
              uses: castor-php/setup-castor@v0.1.0
            - name: Google discovery revision + Apple phpstan keyset
              run: |
                  castor spec:check:google
                  castor spec:check:apple

    phpstan:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4
            - name: cache-composer
              uses: actions/cache@v4
              with:
                  path: ~/.composer/cache/
                  key: composer-${{ github.sha }}
            - name: setup-php
              uses: shivammathur/setup-php@2.32.0
              with:
                  php-version: '8.5'
                  coverage: none
            - name: composer install
              run: composer install --no-interaction --no-ansi
            - name: setup-castor
              uses: castor-php/setup-castor@v0.1.0
            - name: phpstan
              run: castor qa:phpstan

    tests:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php-versions: ['8.3', '8.4', '8.5']
        steps:
            - name: checkout
              uses: actions/checkout@v4
            - name: cache-composer
              uses: actions/cache@v4
              with:
                  path: ~/.composer/cache/
                  key: composer-${{ matrix.php-versions }}-${{ github.sha }}
            - name: setup-php
              uses: shivammathur/setup-php@2.32.0
              with:
                  php-version: ${{ matrix.php-versions }}
                  coverage: none
            - name: composer install
              run: composer install --no-interaction --no-ansi
            - name: phpunit
              run: vendor/bin/phpunit
